[package]
name = "stellar-devkit"
version = "0.1.0"
edition = "2021"
description = "Developer toolkit for testing and simulating the Stellar fee tracker"

[dependencies]
axum = "0.7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }

[dev-dependencies]
serde_json = "1"
